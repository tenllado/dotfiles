[colors]
background = #dee1e6
foreground = #000000
module-bg  = #bec1c6

workspace-bg = #e8e8e7
workspace-fg = #657b83
focused-bg   = #4A90D9
urgent-bg    = #eb4d4b
muted-bg     = #90b1b1
muted-fg     = #2a5c45

[bar/i3bar]
monitor= ${env:MONITOR:}
width = 100%
height = 20pt
position = top
fixed-center = true

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt
module-margin = 1px

# Font stack mapping your exact CSS preferences
font-0 = "DejaVu Sans Mono:size=10;3"
font-1 = "Font Awesome 7 Free:style=Solid:size=10;3"
font-2 = "Font Awesome 7 Free:size=10;3"
font-3 = "Font Awesome 7 Brands:size=10;3"
font-4 = "DejaVuSansM Nerd Font Mono:size=10;3"

modules-left = i3
modules-center = date
modules-right = idle-inhibitor updates-fw updates-apt pulseaudio-output pulseaudio-input network cpu memory temperature backlight battery notification tray power

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

[module/i3]
type = internal/i3
pin-workspaces = true
format = <label-state> <label-mode>
index-sort = true

label-mode = %mode%
label-mode-padding = 1
label-mode-background = #64727D
label-mode-foreground = #ffffff

label-focused = %name%
label-focused-background = ${colors.focused-bg}
label-focused-foreground = #ffffff
label-focused-padding = 1

label-unfocused = %name%
label-unfocused-background = ${colors.workspace-bg}
label-unfocused-foreground = ${colors.workspace-fg}
label-unfocused-padding = 1

label-visible = %name%
label-visible-background = #ababab
label-visible-foreground = #ffffff
label-visible-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.urgent-bg}
label-urgent-foreground = #ffffff
label-urgent-padding = 1

[module/date]
type = internal/date
interval = 1
date = "%H:%M ’ĆŚ "
date-alt = "%d-%m-%Y Ņ¬░"
label = %date%
label-background = ${colors.background}
label-padding = 1

[module/idle-inhibitor]
type = custom/script
exec = bash -c "if [ -f ~/.cache/polybar-lock-inhibited ]; then echo '’ü░'; else echo '’ü«'; fi"
interval = 2
format-background = ${colors.module-bg}
format-padding = 1
click-left = ~/.config/polybar/toggle-inhibitor.sh

[module/updates-apt]
type = custom/script
exec = ~/.config/polybar/updates-apt.sh
interval = 900
format-background = ${colors.module-bg}
format-padding = 1

[module/updates-fw]
type = custom/script
exec = ~/.config/polybar/updates-fw.sh
interval = 3600
format-background = ${colors.module-bg}
format-padding = 1

[module/pulseaudio-output]
type = internal/pulseaudio
use-ui-max = false
format-volume = <ramp-volume> <label-volume>
format-volume-background = ${colors.module-bg}
format-volume-padding = 1
label-volume = %percentage%%

format-muted = ’Ć” off
format-muted-background = ${colors.muted-bg}
format-muted-foreground = ${colors.muted-fg}
format-muted-padding = 1

ramp-volume-0 = ’Ć”
ramp-volume-1 = ’Ć¦
ramp-volume-2 = ’Ć©
click-right = pavucontrol

[module/pulseaudio-input]
type = custom/script
tail = true
exec = bash -c "while true; do muted=\$(pactl get-source-mute @DEFAULT_SOURCE@ | awk '{print \$2}'); if [ \"\$muted\" = \"yes\" ]; then echo '’ä▒ off'; else vol=\$(pactl get-source-volume @DEFAULT_SOURCE@ | awk '{print \$5}' | head -n1); echo \"’ä░ \$vol\"; fi; sleep 1; done"
format-background = ${colors.module-bg}
format-padding = 1
click-left = pactl set-source-mute @DEFAULT_SOURCE@ toggle
click-middle = pavucontrol
scroll-up = pactl set-source-volume @DEFAULT_SOURCE@ +1%
scroll-down = pactl set-source-volume @DEFAULT_SOURCE@ -1%

[module/network]
type = internal/network
interface = wlan0
interval = 3.0
format-connected = <label-connected>
format-connected-background = ${colors.module-bg}
format-connected-padding = 1
label-connected = %essid% (%signal%%) ’ć½

format-disconnected = <label-disconnected>
format-disconnected-background = ${colors.module-bg}
format-disconnected-padding = 1
label-disconnected = Disconnected ŌÜĀ

[module/cpu]
type = internal/cpu
interval = 2
format-background = ${colors.module-bg}
format-padding = 1
label = %percentage%% ’ŗø

[module/memory]
type = internal/memory
interval = 2
format-background = ${colors.module-bg}
format-padding = 1
label = %percentage_used%% ’āē

[module/temperature]
type = internal/temperature
thermal-zone = 0
warn-temperature = 80
format = <ramp> <label>
format-background = ${colors.module-bg}
format-padding = 1
label = %temperature-c%

format-warn = <ramp> <label-warn>
format-warn-background = ${colors.urgent-bg}
format-warn-padding = 1
label-warn = %temperature-c%

ramp-0 = ’ŗŗ
ramp-1 = ’ŗē
ramp-2 = ’ŗć

[module/backlight]
type = internal/backlight
card = intel_backlight
format = <ramp> <label>
format-background = ${colors.module-bg}
format-padding = 1
label = %percentage%%
ramp-0 = ŅÄŹ
ramp-1 = ŅÅō
ramp-2 = ŅÅæ
ramp-3 = ŅÅÅ
ramp-4 = ŅÅÄ
ramp-5 = ŅÅŹ
ramp-6 = ŅÅŖ
ramp-7 = ŅÅł
ramp-8 = ŅÄø

[module/battery]
type = internal/battery
full-at = 95
low-at = 15
battery = BAT0
adapter = AC
poll-interval = 5

format-charging = ’Ś¦ <label-charging>
format-charging-background = ${colors.module-bg}
format-charging-padding = 1
label-charging = %percentage%%

format-discharging = <ramp-capacity> <label-discharging>
format-discharging-background = ${colors.module-bg}
format-discharging-padding = 1
label-discharging = %percentage%%

format-full = ’ć” <label-full>
format-full-background = ${colors.module-bg}
format-full-padding = 1
label-full = %percentage%%

format-low = <ramp-capacity> <label-low>
format-low-background = ${colors.module-bg}
format-low-foreground = #f53c3c
format-low-padding = 1
label-low = %percentage%%

ramp-capacity-0 = ’ēä
ramp-capacity-1 = ’ēā
ramp-capacity-2 = ’ēé
ramp-capacity-3 = ’ēü
ramp-capacity-4 = ’ēĆ

[module/notification]
type = custom/script
exec = bash -c "if dunstctl is-paused | grep -q 'true'; then echo '’ćĘ'; else echo '’éó'; fi"
interval = 2
format-background = ${colors.module-bg}
format-padding = 1
click-left = dunstctl set-paused toggle

[module/tray]
type = internal/tray
tray-spacing = 10px
tray-background = ${colors.module-bg}

[module/power]
type = custom/text
label = " ŌÅ╗ "
label-background = ${colors.module-bg}
label-padding = 1
click-left = ~/.config/rofi/scripts/powermenu.sh
